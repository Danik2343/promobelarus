<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASUS Russia/Belarus | Активация промокода</title>
    <style>
        :root {
            --bg-color: #0b0e14;
            --card-bg: #161a23;
            --accent-color: #ff003c;
            --text-color: #ffffff;
            --text-muted: #8892b0;
            --input-bg: #1f2430;
            --border-color: #2d3548;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 40px;
            width: 100%;
            max-width: 550px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--accent-color), #ff5722);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .brand {
            font-size: 1.2rem;
            font-weight: 800;
            letter-spacing: 3px;
            color: var(--accent-color);
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        h1 {
            font-size: 1.75rem;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .promo-banner {
            background: linear-gradient(135deg, #1f2430 0%, #1a1d26 100%);
            border: 1px dashed var(--accent-color);
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            margin-bottom: 30px;
        }

        .promo-banner span {
            display: block;
            font-size: 0.85rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .promo-code {
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.25rem;
            font-weight: bold;
            color: #fff;
            letter-spacing: 1px;
            word-break: break-all;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: #fff;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 8px rgba(255, 0, 60, 0.2);
        }

        input::placeholder {
            color: #4b5563;
        }

        .btn-submit {
            width: 100%;
            padding: 16px;
            background-color: var(--accent-color);
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .btn-submit:hover {
            background-color: #e00034;
            box-shadow: 0 0 15px rgba(255, 0, 60, 0.4);
            transform: translateY(-1px);
        }

        .btn-submit:active {
            transform: translateY(1px);
        }

        .footer-note {
            text-align: center;
            font-size: 0.75rem;
            color: #4b5563;
            margin-top: 25px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <div class="brand">ASUS Russia/Belarus</div>
            <h1>Получение подарка</h1>
            <div class="subtitle">Заполните данные для доставки вашего пылесоса по промо-акции RTX 5060 Ti</div>
        </div>

        <div class="promo-banner">
            <span>Ваш активируемый код</span>
            <div class="promo-code">ASUS-DUAL-RTX5060Ti-PROMO-375333939309</div>
        </div>

        <form id="promoForm" onsubmit="handleSubmit(event)">
            <input type="hidden" name="promo_code" value="ASUS-DUAL-RTX5060Ti-PROMO-375333939309">

            <div class="form-group">
                <label for="phone">Номер телефона</label>
                <input type="tel" id="phone" name="phone" placeholder="+375 (XX) XXX-XX-XX" required>
            </div>

            <div class="form-group">
                <label for="city">Город</label>
                <input type="text" id="city" name="city" placeholder="Например, Минск, Могилев, Брест" required>
            </div>

            <div class="form-group">
                <label for="address">Адрес доставки</label>
                <input type="text" id="address" name="address" placeholder="Улица, дом, корпус, квартира" required>
            </div>

            <button type="submit" class="btn-submit">Получить пылесос</button>
        </form>

        <div class="footer-note">
            © 2026 ASUS TeK Computer Inc. Все права защищены. Акция действительна при наличии подарков на складе.
        </div>
    </div>

    <script>
        function handleSubmit(event) {
            event.preventDefault();
            
            // Сбор данных из формы
            const formData = new FormData(event.target);
            const data = Object.fromEntries(formData.entries());
            
            // Демонстрация успешной обработки (в реальности здесь будет отправка на сервер/Telegram)
            alert(`Заявка успешно оформлена!\n\nКод: ${data.promo_code}\nТелефон: ${data.phone}\nГород: ${data.city}\nАдрес: ${data.address}\n\nОжидайте сообщения для подтверждения доставки пылесоса!`);
            
            // Пример отправки данных (если понадобится подключить бэкенд):
            /*
            fetch('/api/activate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            }).then(res => ...);
            */
        }
    </script>
</body>
</html>
